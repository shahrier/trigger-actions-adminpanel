<template>
	<lightning-card variant="narrow" icon-name="standard:config">
		<div class="slds-m-around_medium slds-is-relative">
			<template if:true={isLoading}>
				<lightning-spinner alternative-text="Loading" size="medium" class="slds-spinner_container"></lightning-spinner>
			</template>
			<div class="slds-grid slds-gutters_medium">
				<!-- Column 1: SObject List (2-of-12) -->
				<div class="slds-col slds-size_2-of-12">
					<div class="object-panel">
						<div class="panel-header">
							<h3 class="slds-text-heading_small">SObjects</h3>
							<div class="slds-grid slds-grid_vertical-align-center">
								<lightning-button-icon
									icon-name="utility:add"
									alternative-text="Add SObject"
									onclick={handleAddSObject}
									size="small"
									variant="bare"
									class="slds-var-m-right_x-small"
								>
								</lightning-button-icon>
								<lightning-button-icon
									icon-name="utility:refresh"
									alternative-text="Refresh"
									onclick={handleRefresh}
									size="small"
									variant="border-filled"
								>
								</lightning-button-icon>
							</div>
						</div>
						<div class="object-list">
							<template for:each={objectList} for:item="obj">
								<div
									key={obj.name}
									class={obj.cssClass}
									data-object-name={obj.name}
									onclick={handleObjectClick}
								>
									<div class="object-name">{obj.name}</div>
									<div class="object-count">{obj.actionCount}</div>
								</div>
							</template>
							<template if:false={objectList.length}>
								<div class="slds-p-around_medium slds-text-align_center">
									<p class="slds-text-body_small slds-text-color_weak">None</p>
								</div>
							</template>
						</div>
					</div>
				</div>

				<!-- Column 2: Actions Grouped List (5-of-12) -->
				<template if:true={selectedObjectName}>
					<div class="slds-col slds-size_5-of-12">
						<div class="actions-toolbar slds-var-m-bottom_small">
							<h3 class="slds-text-heading_small toolbar-title">Actions: {selectedObjectName}</h3>
							<lightning-button-group>
								<lightning-button
									label="Create"
									icon-name="utility:add"
									variant="brand"
									onclick={handleCreateNew}
								>
								</lightning-button>
								<lightning-button
									label="Edit"
									icon-name="utility:edit"
									variant="neutral"
									onclick={handleEdit}
									disabled={noActionSelected}
								>
								</lightning-button>
							</lightning-button-group>
						</div>

						<div class="actions-list">
							<template if:true={hasObjectActions}>
								<template for:each={objectActions} for:item="section">
									<div key={section.key} class="context-section">
										<div class="context-header">
											<span class="context-header-label">{section.label}</span>
											<span class="context-header-count">{section.actions.length}</span>
										</div>
										<template for:each={section.actions} for:item="action">
											<div
												key={action.compositeId}
												class={action.cssClass}
												data-action-id={action.Id}
												onclick={handleActionClick}
											>
												<div class="action-order">#{action.Order__c}</div>
												<div class="action-details-compact">
													<div class="action-name-compact">{action.DeveloperName}</div>
													<div class="action-class-compact">{action.Apex_Class_Name__c}</div>
												</div>
												<div class="action-status-compact">
													<template if:true={action.Bypass_Execution__c}>
														<lightning-icon icon-name="utility:warning" size="xx-small" variant="warning"></lightning-icon>
													</template>
												</div>
											</div>
										</template>
									</div>
								</template>
							</template>
							<template if:false={hasObjectActions}>
								<div class="slds-p-around_large slds-text-align_center">
									<p class="slds-text-body_small slds-text-color_weak">No trigger actions for this SObject</p>
									<lightning-button
										label="Create First Action"
										icon-name="utility:add"
										variant="brand"
										onclick={handleCreateNew}
										class="slds-var-m-top_small"
									>
									</lightning-button>
								</div>
							</template>
						</div>
					</div>

					<!-- Column 3: Action Details (5-of-12) -->
					<div class="slds-col slds-size_5-of-12">
						<template if:true={selectedAction}>
							<div class="detail-panel">
								<lightning-card title="Action Details" icon-name="standard:record">
									<div class="slds-m-around_medium">
										<div class="slds-grid slds-wrap">
											<div class="slds-col slds-size_1-of-1 detail-row">
												<div class="detail-label">Developer Name</div>
												<div class="detail-value">{selectedAction.DeveloperName}</div>
											</div>
											<div class="slds-col slds-size_1-of-1 detail-row">
												<div class="detail-label">Apex Class</div>
												<div class="detail-value">{selectedAction.Apex_Class_Name__c}</div>
											</div>
											<div class="slds-col slds-size_1-of-2 detail-row">
												<div class="detail-label">Order</div>
												<div class="detail-value">{selectedAction.Order__c}</div>
											</div>
											<template if:true={selectedAction.Flow_Name__c}>
												<div class="slds-col slds-size_1-of-2 detail-row">
													<div class="detail-label">Flow Name</div>
													<div class="detail-value">{selectedAction.Flow_Name__c}</div>
												</div>
											</template>
											<div class="slds-col slds-size_1-of-1 detail-row">
												<div class="detail-label">Contexts</div>
												<div class="detail-value">
													<template for:each={activeContextLabels} for:item="ctx">
														<lightning-badge
															key={ctx.key}
															label={ctx.label}
															class="slds-var-m-right_xx-small"
														>
														</lightning-badge>
													</template>
												</div>
											</div>
											<template if:true={selectedAction.Entry_Criteria__c}>
												<div class="slds-col slds-size_1-of-1 detail-row">
													<div class="detail-label">Entry Criteria</div>
													<div class="detail-value criteria-text">{selectedAction.Entry_Criteria__c}</div>
												</div>
											</template>
											<template if:true={selectedAction.Description__c}>
												<div class="slds-col slds-size_1-of-1 detail-row">
													<div class="detail-label">Description</div>
													<div class="detail-value">{selectedAction.Description__c}</div>
												</div>
											</template>
											<div class="slds-col slds-size_1-of-2 detail-row">
												<div class="detail-label">Bypass Execution</div>
												<div class="detail-value">
													<lightning-icon
														icon-name={bypassIcon}
														size="x-small"
														class="slds-var-m-right_xx-small"
													></lightning-icon>
													{bypassLabel}
												</div>
											</div>
											<div class="slds-col slds-size_1-of-2 detail-row">
												<div class="detail-label">Allow Flow Recursion</div>
												<div class="detail-value">
													<lightning-icon
														icon-name={flowRecursionIcon}
														size="x-small"
														class="slds-var-m-right_xx-small"
													></lightning-icon>
													{flowRecursionLabel}
												</div>
											</div>
										</div>
									</div>
								</lightning-card>
							</div>
						</template>
						<template if:false={selectedAction}>
							<div class="empty-state slds-text-align_center">
								<lightning-icon icon-name="standard:record" size="large" class="slds-var-m-bottom_medium slds-icon-text-light"></lightning-icon>
								<p class="slds-text-body_small slds-text-color_weak">Select an action to view details</p>
							</div>
						</template>
					</div>
				</template>

				<!-- No object selected: Welcome Dashboard (10-of-12) -->
				<template if:false={selectedObjectName}>
					<div class="slds-col slds-size_10-of-12">
						<div class="welcome-dashboard slds-text-align_center">
							<div class="welcome-header">
								<lightning-icon icon-name="standard:config" size="large" class="slds-var-m-bottom_medium"></lightning-icon>
								<h1 class="welcome-title">Trigger Actions Admin Panel</h1>
								<p class="welcome-subtitle">
									A streamlined UI for configuring and ordering your Trigger Actions metadata.
								</p>
							</div>

							<div class="getting-started-grid">
								<div class="step-card">
									<div class="step-number">1</div>
									<h3 class="step-title">Select SObject</h3>
									<p class="step-description">
										Choose an SObject from the sidebar to view its active trigger actions and settings.
									</p>
								</div>
								<div class="step-card">
									<div class="step-number">2</div>
									<h3 class="step-title">Add Settings</h3>
									<p class="step-description">
										Use the "+" button in the sidebar to add trigger settings for new SObjects.
									</p>
								</div>
								<div class="step-card">
									<div class="step-number">3</div>
									<h3 class="step-title">Manage Actions</h3>
									<p class="step-description">
										Create, edit, or reorder Apex and Flow actions to control your execution logic.
									</p>
								</div>
							</div>

							<div class="upstream-footer">
								<p class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_small">
									Powered by the Trigger Actions Framework
								</p>
								<a href="https://github.com/mitchspano/trigger-actions-framework" target="_blank" rel="noopener noreferrer" class="upstream-link">
									<lightning-icon icon-name="utility:github" size="xx-small" variant="base"></lightning-icon>
									<span>View Framework Documentation</span>
									<lightning-icon icon-name="utility:new_window" size="xx-small" variant="base" class="slds-var-m-left_xx-small"></lightning-icon>
								</a>
							</div>
						</div>
					</div>
				</template>
			</div>
		</div>
	</lightning-card>

	<!-- Create/Edit Form Modal -->
	<template if:true={showFormModal}>
		<c-trigger-action-form
			action={selectedAction}
			is-creating={isCreating}
			available-s-objects={availableSObjects}
			onclose={handleFormClose}
			onsavesuccess={handleSaveSuccess}
		>
		</c-trigger-action-form>
	</template>

	<!-- Add SObject Form Modal -->
	<template if:true={showSettingFormModal}>
		<c-trigger-setting-form
			onclose={handleSettingFormClose}
			onsavesuccess={handleSettingSaveSuccess}
		>
		</c-trigger-setting-form>
	</template>
</template>
