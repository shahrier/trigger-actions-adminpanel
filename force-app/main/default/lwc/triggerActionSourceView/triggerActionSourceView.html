<template>
	<template if:true={showModal}>
		<section
			role="dialog"
			tabindex="-1"
			aria-labelledby="modal-heading-01"
			aria-modal="true"
			aria-describedby="modal-content-id-1"
			class="slds-modal slds-fade-in-open slds-modal_large"
		>
			<div class="slds-modal__container">
				<header class="slds-modal__header">
					<button
						class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
						title="Close"
						onclick={handleClose}
					>
						<lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
						<span class="slds-assistive-text">Close</span>
					</button>
					<h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">
						Source View: {className}
					</h2>
				</header>
				<div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
					<template if:true={isLoading}>
						<lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
					</template>
					<template if:true={error}>
						<div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
							<span class="slds-assistive-text">error</span>
							<h2>{error}</h2>
						</div>
					</template>
					<template if:true={classBody}>
						<pre class="code-container"><code>{classBody}</code></pre>
					</template>
				</div>
				<footer class="slds-modal__footer">
					<lightning-button label="Close" variant="neutral" onclick={handleClose}></lightning-button>
				</footer>
			</div>
		</section>
		<div class="slds-backdrop slds-backdrop_open"></div>
	</template>
</template>
